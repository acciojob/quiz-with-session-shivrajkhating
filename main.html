<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #141417;
      --card: #1a1a1f;
      --border: #2a2a35;
      --accent: #c8f135;
      --accent2: #7b5ea7;
      --text: #f0f0f0;
      --muted: #6b6b80;
      --correct: #22c55e;
      --wrong: #ef4444;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 80px;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 80% 10%, rgba(200, 241, 53, 0.06) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 10% 80%, rgba(123, 94, 167, 0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      width: 100%;
      max-width: 680px;
      position: relative;
      z-index: 1;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
    }

    .tag {
      display: inline-block;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(200, 241, 53, 0.08);
      border: 1px solid rgba(200, 241, 53, 0.2);
      padding: 4px 12px;
      border-radius: 2px;
      margin-bottom: 16px;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 3.2rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.05;
      background: linear-gradient(135deg, #f0f0f0 30%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      margin-top: 10px;
      font-size: 14px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
    }

    /* Progress bar */
    .progress-bar-wrap {
      background: var(--border);
      border-radius: 99px;
      height: 4px;
      margin-bottom: 36px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      transition: width 0.4s cubic-bezier(.4,0,.2,1);
      width: 0%;
    }

    /* Questions */
    div#questions {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    div#questions > div {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px;
      position: relative;
      transition: border-color 0.2s, transform 0.2s;
      animation: slideUp 0.5s both;
    }

    div#questions > div:hover {
      border-color: rgba(200, 241, 53, 0.2);
      transform: translateY(-1px);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    div#questions > div:nth-child(1) { animation-delay: 0.05s; }
    div#questions > div:nth-child(2) { animation-delay: 0.10s; }
    div#questions > div:nth-child(3) { animation-delay: 0.15s; }
    div#questions > div:nth-child(4) { animation-delay: 0.20s; }
    div#questions > div:nth-child(5) { animation-delay: 0.25s; }

    .q-number {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .q-text {
      font-size: 16px;
      font-weight: 600;
      line-height: 1.5;
      margin-bottom: 20px;
      color: var(--text);
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .option-label {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      font-size: 14px;
      line-height: 1.4;
    }

    .option-label:hover {
      background: rgba(200, 241, 53, 0.05);
      border-color: rgba(200, 241, 53, 0.3);
    }

    input[type='radio'] {
      appearance: none;
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid var(--muted);
      flex-shrink: 0;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      cursor: pointer;
    }

    input[type='radio']:checked {
      border-color: var(--accent);
      background: var(--accent);
      box-shadow: 0 0 0 3px rgba(200, 241, 53, 0.18);
    }

    .option-label:has(input[type='radio']:checked) {
      background: rgba(200, 241, 53, 0.07);
      border-color: rgba(200, 241, 53, 0.4);
      color: var(--accent);
    }

    /* Submit */
    .actions {
      margin-top: 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .answers-count {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--muted);
    }

    button#submit {
      padding: 14px 36px;
      background: var(--accent);
      color: #0d0d0f;
      border: none;
      border-radius: 8px;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.01em;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, background 0.2s;
      position: relative;
      overflow: hidden;
    }

    button#submit::after {
      content: '';
      position: absolute;
      inset: 0;
      background: white;
      opacity: 0;
      transition: opacity 0.2s;
    }

    button#submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(200, 241, 53, 0.35);
    }

    button#submit:active {
      transform: translateY(0);
    }

    /* Score */
    div#score {
      margin-top: 28px;
      min-height: 0;
      transition: all 0.4s;
    }

    .score-card {
      background: var(--card);
      border: 1px solid rgba(200, 241, 53, 0.3);
      border-radius: 12px;
      padding: 28px 32px;
      display: flex;
      align-items: center;
      gap: 24px;
      animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.9); }
      to   { opacity: 1; transform: scale(1); }
    }

    .score-icon {
      font-size: 40px;
      flex-shrink: 0;
    }

    .score-label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .score-value {
      font-size: 28px;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -0.02em;
    }

    .score-sub {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
      font-family: 'DM Mono', monospace;
    }

    /* Saved score banner */
    .saved-banner {
      margin-top: 10px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }
    .saved-banner span {
      color: var(--correct);
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <header>
      <div class="tag">5 Questions · Multiple Choice</div>
      <h1>Knowledge Quiz</h1>
      <p class="subtitle">Select one answer per question → submit to score</p>
    </header>

    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressBar"></div>
    </div>

    <div id="questions"></div>

    <div class="actions">
      <span class="answers-count" id="answersCount">0 of 5 answered</span>
      <button id="submit">Submit Quiz →</button>
    </div>

    <div id="score"></div>
    <div class="saved-banner" id="savedBanner" style="display:none">
      <span>✓</span> Score saved to local storage
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
